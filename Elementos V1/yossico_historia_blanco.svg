<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 1100" width="900" height="1100">
  <rect width="900" height="1100" fill="#ffffff"/>

  <!-- Header decorativo -->
  <line x1="60" y1="60" x2="840" y2="60" stroke="#e0e0e0" stroke-width="0.5"/>

  <text x="450" y="100" font-family="'Helvetica Neue',Helvetica,sans-serif" font-size="7" font-weight="300" fill="#bbb" letter-spacing="6" text-anchor="middle">LA HISTORIA DETRÁS DEL NOMBRE</text>

  <text x="450" y="155" font-family="'Didot','Bodoni MT','Playfair Display',serif" font-size="52" font-weight="400" fill="#1a1a1a" letter-spacing="14" text-anchor="middle">YOSSICO</text>

  <line x1="340" y1="175" x2="450" y2="175" stroke="#ddd" stroke-width="0.5"/>
  <circle cx="450" cy="175" r="2.5" fill="#bbb"/>
  <line x1="450" y1="175" x2="560" y2="175" stroke="#ddd" stroke-width="0.5"/>

  <text x="450" y="200" font-family="'Helvetica Neue',Helvetica,sans-serif" font-size="8" font-weight="200" fill="#bbb" letter-spacing="4" text-anchor="middle">COLOMBIA · FUNDADA 2024</text>

  <!-- Párrafo 1 — El momento -->
  <text x="450" y="258" font-family="'Didot','Bodoni MT','Playfair Display',serif" font-size="15" font-weight="400" fill="#1a1a1a" letter-spacing="1" text-anchor="middle">Era la madrugada de un turno de urgencias</text>
  <text x="450" y="280" font-family="'Didot','Bodoni MT','Playfair Display',serif" font-size="15" font-weight="400" fill="#1a1a1a" letter-spacing="1" text-anchor="middle">en Bogotá cuando la idea nació.</text>

  <text x="450" y="322" font-family="'Helvetica Neue',Helvetica,sans-serif" font-size="11" font-weight="200" fill="#666" letter-spacing="0.3" text-anchor="middle">Una profesional de la salud miró su uniforme y pensó:</text>
  <text x="450" y="342" font-family="'Helvetica Neue',Helvetica,sans-serif" font-size="11" font-weight="200" fill="#666" letter-spacing="0.3" text-anchor="middle">"Trabajo en el lugar más importante del mundo</text>
  <text x="450" y="362" font-family="'Helvetica Neue',Helvetica,sans-serif" font-size="11" font-weight="200" fill="#666" letter-spacing="0.3" text-anchor="middle">y mi uniforme no lo refleja."</text>

  <!-- Párrafo 2 — El nombre -->
  <text x="450" y="410" font-family="'Helvetica Neue',Helvetica,sans-serif" font-size="11" font-weight="200" fill="#666" letter-spacing="0.3" text-anchor="middle">Buscó un nombre que sonara a identidad propia,</text>
  <text x="450" y="430" font-family="'Helvetica Neue',Helvetica,sans-serif" font-size="11" font-weight="200" fill="#666" letter-spacing="0.3" text-anchor="middle">a algo que ninguna otra marca en Colombia tuviera.</text>
  <text x="450" y="462" font-family="'Helvetica Neue',Helvetica,sans-serif" font-size="11" font-weight="200" fill="#666" letter-spacing="0.3" text-anchor="middle">Tomó su nombre —</text>
  <text x="450" y="482" font-family="'Didot','Bodoni MT','Playfair Display',serif" font-size="15" font-weight="400" fill="#1a1a1a" letter-spacing="1" text-anchor="middle">sus iniciales, su historia, su linaje —</text>
  <text x="450" y="504" font-family="'Helvetica Neue',Helvetica,sans-serif" font-size="11" font-weight="200" fill="#666" letter-spacing="0.3" text-anchor="middle">y lo fundió con la única palabra que define</text>
  <text x="450" y="524" font-family="'Helvetica Neue',Helvetica,sans-serif" font-size="11" font-weight="200" fill="#666" letter-spacing="0.3" text-anchor="middle">lo que hace: Co. Colectivo. Colombia. Compañía.</text>

  <!-- Párrafo 3 — El significado construido -->
  <line x1="360" y1="556" x2="540" y2="556" stroke="#e8e8e8" stroke-width="0.5"/>

  <text x="450" y="590" font-family="'Helvetica Neue',Helvetica,sans-serif" font-size="11" font-weight="200" fill="#666" letter-spacing="0.3" text-anchor="middle">Con el tiempo, el equipo construyó lo que el nombre</text>
  <text x="450" y="610" font-family="'Helvetica Neue',Helvetica,sans-serif" font-size="11" font-weight="200" fill="#666" letter-spacing="0.3" text-anchor="middle">ya parecía gritar por sí solo:</text>

  <!-- Acrónimo — cada letra -->
  <text x="200" y="658" font-family="'Didot','Bodoni MT','Playfair Display',serif" font-size="28" font-weight="400" fill="#1a1a1a" letter-spacing="2" text-anchor="middle">Y</text>
  <text x="290" y="658" font-family="'Helvetica Neue',Helvetica,sans-serif" font-size="10" font-weight="200" fill="#888" letter-spacing="1" text-anchor="start">Your standard. Tu nivel de excelencia.</text>

  <text x="200" y="690" font-family="'Didot','Bodoni MT','Playfair Display',serif" font-size="28" font-weight="400" fill="#1a1a1a" letter-spacing="2" text-anchor="middle">O</text>
  <text x="290" y="690" font-family="'Helvetica Neue',Helvetica,sans-serif" font-size="10" font-weight="200" fill="#888" letter-spacing="1" text-anchor="start">Origen. La vocación que no se elige, se siente.</text>

  <text x="200" y="722" font-family="'Didot','Bodoni MT','Playfair Display',serif" font-size="28" font-weight="400" fill="#1a1a1a" letter-spacing="2" text-anchor="middle">S</text>
  <text x="290" y="722" font-family="'Helvetica Neue',Helvetica,sans-serif" font-size="10" font-weight="200" fill="#888" letter-spacing="1" text-anchor="start">Salud. La razón de existir.</text>

  <text x="200" y="754" font-family="'Didot','Bodoni MT','Playfair Display',serif" font-size="28" font-weight="400" fill="#1a1a1a" letter-spacing="2" text-anchor="middle">S</text>
  <text x="290" y="754" font-family="'Helvetica Neue',Helvetica,sans-serif" font-size="10" font-weight="200" fill="#888" letter-spacing="1" text-anchor="start">Servicio. Cada turno, cada paciente, cada detalle.</text>

  <text x="200" y="786" font-family="'Didot','Bodoni MT','Playfair Display',serif" font-size="28" font-weight="400" fill="#1a1a1a" letter-spacing="2" text-anchor="middle">I</text>
  <text x="290" y="786" font-family="'Helvetica Neue',Helvetica,sans-serif" font-size="10" font-weight="200" fill="#888" letter-spacing="1" text-anchor="start">Identidad. Un uniforme que te reconoce.</text>

  <text x="200" y="818" font-family="'Didot','Bodoni MT','Playfair Display',serif" font-size="28" font-weight="400" fill="#1a1a1a" letter-spacing="2" text-anchor="middle">C</text>
  <text x="290" y="818" font-family="'Helvetica Neue',Helvetica,sans-serif" font-size="10" font-weight="200" fill="#888" letter-spacing="1" text-anchor="start">Calidad. Sin negociación.</text>

  <text x="200" y="850" font-family="'Didot','Bodoni MT','Playfair Display',serif" font-size="28" font-weight="400" fill="#1a1a1a" letter-spacing="2" text-anchor="middle">O</text>
  <text x="290" y="850" font-family="'Helvetica Neue',Helvetica,sans-serif" font-size="10" font-weight="200" fill="#888" letter-spacing="1" text-anchor="start">Orgullo. De quién eres y lo que haces.</text>

  <!-- Línea divisora -->
  <line x1="180" y1="880" x2="720" y2="880" stroke="#e8e8e8" stroke-width="0.5"/>

  <!-- Cierre -->
  <text x="450" y="920" font-family="'Helvetica Neue',Helvetica,sans-serif" font-size="11" font-weight="200" fill="#666" letter-spacing="0.3" text-anchor="middle">YOSSICO no es solo una marca de uniformes médicos.</text>
  <text x="450" y="942" font-family="'Helvetica Neue',Helvetica,sans-serif" font-size="11" font-weight="200" fill="#666" letter-spacing="0.3" text-anchor="middle">Es el reconocimiento de que quien cuida a otros</text>
  <text x="450" y="962" font-family="'Helvetica Neue',Helvetica,sans-serif" font-size="11" font-weight="200" fill="#666" letter-spacing="0.3" text-anchor="middle">merece verse y sentirse extraordinario.</text>

  <!-- Tagline final -->
  <line x1="340" y1="1000" x2="560" y2="1000" stroke="#e8e8e8" stroke-width="0.4"/>
  <text x="450" y="1034" font-family="'Didot','Bodoni MT','Playfair Display',serif" font-size="14" font-style="italic" fill="#aaa" letter-spacing="2" text-anchor="middle">"Vestidos para sanar. Diseñados para perdurar."</text>

  <line x1="60" y1="1070" x2="840" y2="1070" stroke="#e0e0e0" stroke-width="0.5"/>
  <text x="450" y="1090" font-family="'Helvetica Neue',Helvetica,sans-serif" font-size="7" font-weight="200" fill="#ccc" letter-spacing="4" text-anchor="middle">YOSSICO · INFORMES MÉDICOS · COLOMBIA</text>
</svg>
