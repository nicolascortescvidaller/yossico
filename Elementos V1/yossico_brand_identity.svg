<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 1400" width="1000" height="1400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f2f0ed"/>
      <stop offset="100%" style="stop-color:#e8e5e1"/>
    </linearGradient>
    <linearGradient id="bgDark" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0e0e0e"/>
      <stop offset="100%" style="stop-color:#1a1a1a"/>
    </linearGradient>
    <linearGradient id="sectionDark" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#131313"/>
      <stop offset="100%" style="stop-color:#1e1e1e"/>
    </linearGradient>
  </defs>

  <!-- ======================================================= -->
  <!-- BACKGROUND COMPLETO -->
  <!-- ======================================================= -->
  <rect width="1000" height="1400" fill="url(#bg)"/>

  <!-- ======================================================= -->
  <!-- SECCIÓN 1: WORDMARK (uniforme) — fondo oscuro -->
  <!-- ======================================================= -->
  <rect x="0" y="0" width="1000" height="420" fill="url(#sectionDark)"/>

  <!-- Etiqueta sección -->
  <text x="500" y="52" font-family="'Helvetica Neue', Helvetica, sans-serif" font-size="8" font-weight="300" fill="#555" letter-spacing="5" text-anchor="middle">01 — WORDMARK / UNIFORME</text>

  <!-- Línea superior decorativa -->
  <line x1="80" y1="65" x2="920" y2="65" stroke="#2a2a2a" stroke-width="0.4"/>

  <!-- WORDMARK principal — estilo lujo como FIGS -->
  <!-- Usamos path para simular una tipografía serif fina y elegante -->
  <text x="500" y="230"
    font-family="'Didot', 'Bodoni MT', 'Playfair Display', 'Times New Roman', serif"
    font-size="88"
    font-weight="400"
    fill="#f0eeea"
    letter-spacing="20"
    text-anchor="middle"
    font-style="normal">YOSSICO</text>

  <!-- Línea inferior bajo wordmark -->
  <line x1="160" y1="268" x2="840" y2="268" stroke="#2e2e2e" stroke-width="0.5"/>

  <!-- Subtítulo marca -->
  <text x="500" y="295"
    font-family="'Helvetica Neue', Helvetica, sans-serif"
    font-size="9"
    font-weight="200"
    fill="#666"
    letter-spacing="7"
    text-anchor="middle">INFORMES MÉDICOS · COLOMBIA</text>

  <!-- Versión compacta — como aparecería bordada en uniforme -->
  <text x="200" y="380"
    font-family="'Didot', 'Bodoni MT', 'Playfair Display', serif"
    font-size="22"
    font-weight="400"
    fill="#888"
    letter-spacing="6"
    text-anchor="middle">YOSSICO</text>

  <text x="500" y="380"
    font-family="'Helvetica Neue', Helvetica, sans-serif"
    font-size="7"
    font-weight="200"
    fill="#444"
    letter-spacing="3"
    text-anchor="middle">← tamaño bordado en pecho →</text>

  <text x="800" y="380"
    font-family="'Didot', 'Bodoni MT', 'Playfair Display', serif"
    font-size="16"
    font-weight="400"
    fill="#666"
    letter-spacing="5"
    text-anchor="middle">YOSSICO</text>

  <!-- ======================================================= -->
  <!-- SECCIÓN 2: ÍCONO / SÍMBOLO DE MARCA -->
  <!-- ======================================================= -->
  <rect x="0" y="420" width="1000" height="480" fill="url(#bg)"/>

  <!-- Etiqueta sección -->
  <text x="500" y="468" font-family="'Helvetica Neue', Helvetica, sans-serif" font-size="8" font-weight="300" fill="#999" letter-spacing="5" text-anchor="middle">02 — SÍMBOLO DE MARCA</text>
  <line x1="80" y1="480" x2="920" y2="480" stroke="#ccc" stroke-width="0.4"/>

  <!-- ÍCONO: Pulso médico que forma una Y estilizada -->
  <!-- El símbolo: una línea de ritmo cardíaco (ECG) que en su punto más alto forma una Y -->
  <!-- Concepto: el "latido" de la excelencia médica -->

  <g transform="translate(500, 650)">
    <!-- Marco cuadrado con esquinas cortadas — estilo sello de lujo -->
    <polygon points="0,-140 99,-99 140,0 99,99 0,140 -99,99 -140,0 -99,-99"
      fill="none" stroke="#1a1a1a" stroke-width="1.5"/>
    <polygon points="0,-128 90,-90 128,0 90,90 0,128 -90,90 -128,0 -90,-90"
      fill="none" stroke="#1a1a1a" stroke-width="0.4"/>

    <!-- Ícono central: pulso ECG estilizado que forma Y -->
    <!-- Línea base izquierda -->
    <path d="M-90,0 L-50,0 L-28,-48 L0,-72 L0,-20 L0,52 L28,-48 L50,0 L90,0"
      fill="none" stroke="#1a1a1a" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round"/>

    <!-- Punto de intersección — detalle de precisión -->
    <circle cx="0" cy="-72" r="3.5" fill="#1a1a1a"/>

    <!-- Pequeños puntos decorativos en las esquinas del octógono -->
    <circle cx="0" cy="-140" r="3" fill="#1a1a1a"/>
    <circle cx="0" cy="140" r="3" fill="#1a1a1a"/>
    <circle cx="-140" cy="0" r="3" fill="#1a1a1a"/>
    <circle cx="140" cy="0" r="3" fill="#1a1a1a"/>
  </g>

  <!-- Descripción del símbolo -->
  <text x="500" y="826" font-family="'Helvetica Neue', Helvetica, sans-serif" font-size="8" font-weight="200" fill="#aaa" letter-spacing="3" text-anchor="middle">EL LATIDO · SÍMBOLO DE EXCELENCIA MÉDICA</text>

  <!-- Versión pequeña del ícono — uso en app / pin / bordado -->
  <g transform="translate(500, 880)">
    <polygon points="0,-22 16,-16 22,0 16,16 0,22 -16,16 -22,0 -16,-16" fill="#1a1a1a"/>
    <path d="M-14,0 L-8,0 L-4,-8 L0,-12 L0,-3 L0,8 L4,-8 L8,0 L14,0"
      fill="none" stroke="#f0eeea" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <text x="500" y="922" font-family="'Helvetica Neue', Helvetica, sans-serif" font-size="7" font-weight="200" fill="#bbb" letter-spacing="2" text-anchor="middle">versión ícono compacto</text>

  <!-- ======================================================= -->
  <!-- SECCIÓN 3: HISTORIA DE LA MARCA -->
  <!-- ======================================================= -->
  <rect x="0" y="900" width="1000" height="500" fill="#0e0e0e"/>

  <!-- Etiqueta -->
  <text x="500" y="948" font-family="'Helvetica Neue', Helvetica, sans-serif" font-size="8" font-weight="300" fill="#444" letter-spacing="5" text-anchor="middle">03 — HISTORIA DE LA MARCA</text>
  <line x1="80" y1="960" x2="920" y2="960" stroke="#222" stroke-width="0.4"/>

  <!-- Título historia -->
  <text x="500" y="1010"
    font-family="'Didot', 'Bodoni MT', 'Playfair Display', serif"
    font-size="32"
    font-weight="400"
    fill="#f0eeea"
    letter-spacing="10"
    text-anchor="middle">EL ORIGEN</text>

  <text x="500" y="1038"
    font-family="'Helvetica Neue', Helvetica, sans-serif"
    font-size="8"
    font-weight="200"
    fill="#555"
    letter-spacing="4"
    text-anchor="middle">LA HISTORIA DETRÁS DE YOSSICO</text>

  <line x1="380" y1="1052" x2="500" y2="1052" stroke="#333" stroke-width="0.4"/>
  <circle cx="500" cy="1052" r="2" fill="#555"/>
  <line x1="500" y1="1052" x2="620" y2="1052" stroke="#333" stroke-width="0.4"/>

  <!-- Texto historia — párrafos -->
  <!-- Párrafo 1 -->
  <text x="500" y="1092" font-family="'Didot', 'Bodoni MT', 'Playfair Display', serif" font-size="13" font-weight="300" fill="#c8c5c0" letter-spacing="1" text-anchor="middle">En hebreo, Yossi significa "Dios añadirá" — una promesa</text>
  <text x="500" y="1114" font-family="'Didot', 'Bodoni MT', 'Playfair Display', serif" font-size="13" font-weight="300" fill="#c8c5c0" letter-spacing="1" text-anchor="middle">de abundancia, propósito y cuidado hacia el otro.</text>

  <text x="500" y="1150" font-family="'Helvetica Neue', Helvetica, sans-serif" font-size="10.5" font-weight="200" fill="#666" letter-spacing="0.5" text-anchor="middle">Cuando los fundadores de YOSSICO buscaban un nombre</text>
  <text x="500" y="1168" font-family="'Helvetica Neue', Helvetica, sans-serif" font-size="10.5" font-weight="200" fill="#666" letter-spacing="0.5" text-anchor="middle">para su marca, sabían que debía cargar el peso de una</text>
  <text x="500" y="1186" font-family="'Helvetica Neue', Helvetica, sans-serif" font-size="10.5" font-weight="200" fill="#666" letter-spacing="0.5" text-anchor="middle">vocación: servir a quienes salvan vidas.</text>

  <text x="500" y="1222" font-family="'Helvetica Neue', Helvetica, sans-serif" font-size="10.5" font-weight="200" fill="#666" letter-spacing="0.5" text-anchor="middle">"Co" no es solo compañía. Es colectivo, es Colombia,</text>
  <text x="500" y="1240" font-family="'Helvetica Neue', Helvetica, sans-serif" font-size="10.5" font-weight="200" fill="#666" letter-spacing="0.5" text-anchor="middle">es el tejido humano que une a los profesionales de la salud.</text>

  <text x="500" y="1276" font-family="'Helvetica Neue', Helvetica, sans-serif" font-size="10.5" font-weight="200" fill="#666" letter-spacing="0.5" text-anchor="middle">Así nació YOSSICO: la unión de un propósito divino</text>
  <text x="500" y="1294" font-family="'Helvetica Neue', Helvetica, sans-serif" font-size="10.5" font-weight="200" fill="#666" letter-spacing="0.5" text-anchor="middle">con la comunidad médica colombiana. Cada informe,</text>
  <text x="500" y="1312" font-family="'Helvetica Neue', Helvetica, sans-serif" font-size="10.5" font-weight="200" fill="#666" letter-spacing="0.5" text-anchor="middle">cada uniforme, cada hilo bordado lleva consigo</text>
  <text x="500" y="1330" font-family="'Helvetica Neue', Helvetica, sans-serif" font-size="10.5" font-weight="200" fill="#666" letter-spacing="0.5" text-anchor="middle">la promesa de excelencia que el nombre representa.</text>

  <!-- Frase final -->
  <line x1="380" y1="1356" x2="620" y2="1356" stroke="#222" stroke-width="0.4"/>
  <text x="500" y="1378"
    font-family="'Didot', 'Bodoni MT', 'Playfair Display', serif"
    font-size="11"
    font-style="italic"
    fill="#3a3a3a"
    letter-spacing="2"
    text-anchor="middle">"Vestidos para sanar. Diseñados para perdurar."</text>
</svg>
