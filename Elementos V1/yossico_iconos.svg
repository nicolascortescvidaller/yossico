<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 1600" width="1000" height="1600">
  <defs>
    <linearGradient id="bgLight" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f2f0ed"/>
      <stop offset="100%" style="stop-color:#e8e6e2"/>
    </linearGradient>
    <linearGradient id="bgDark" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d0d0d"/>
      <stop offset="100%" style="stop-color:#181818"/>
    </linearGradient>
  </defs>

  <!-- Fondo general -->
  <rect width="1000" height="1600" fill="url(#bgLight)"/>

  <!-- ============================================================ -->
  <!-- HEADER -->
  <!-- ============================================================ -->
  <rect x="0" y="0" width="1000" height="80" fill="#0d0d0d"/>
  <text x="500" y="36" font-family="'Helvetica Neue', Helvetica, sans-serif" font-size="8" font-weight="300" fill="#444" letter-spacing="6" text-anchor="middle">YOSSICO — EXPLORACIÓN DE ÍCONO ABSTRACTO</text>
  <text x="500" y="58" font-family="'Didot','Bodoni MT','Playfair Display',serif" font-size="20" font-weight="400" fill="#f0eeea" letter-spacing="10" text-anchor="middle">3 CONCEPTOS</text>

  <!-- ============================================================ -->
  <!-- CONCEPTO A: "LA AGUJA" -->
  <!-- Hilo médico que forma un trazo continuo y fluido -->
  <!-- Simple, elegante, cuenta una historia -->
  <!-- ============================================================ -->
  <rect x="0" y="80" width="1000" height="480" fill="url(#bgLight)"/>

  <text x="500" y="126" font-family="'Helvetica Neue',Helvetica,sans-serif" font-size="7.5" font-weight="300" fill="#aaa" letter-spacing="5" text-anchor="middle">CONCEPTO A</text>

  <text x="500" y="152" font-family="'Didot','Bodoni MT','Playfair Display',serif" font-size="26" font-weight="400" fill="#1a1a1a" letter-spacing="6" text-anchor="middle">LA AGUJA</text>
  <text x="500" y="172" font-family="'Helvetica Neue',Helvetica,sans-serif" font-size="9" font-weight="200" fill="#888" letter-spacing="3" text-anchor="middle">un trazo continuo. sin cortes. sin interrupciones.</text>

  <!-- Ícono A: trazo único continuo que sugiere hilo de sutura formando una forma fluida -->
  <g transform="translate(500, 310)">
    <!-- Trazo continuo: curva que sube, se dobla y cae — como una aguja pasando tela -->
    <!-- Forma: ola asimétrica elegante, un solo trazo -->
    <path d="M-90,40 C-90,40 -60,40 -40,0 C-20,-40 -10,-80 20,-80 C50,-80 60,-40 60,0 C60,30 40,50 20,50 C0,50 -10,20 10,0"
      fill="none"
      stroke="#1a1a1a"
      stroke-width="3"
      stroke-linecap="round"
      stroke-linejoin="round"/>
    <!-- Punto de aguja — inicio del trazo -->
    <circle cx="-90" cy="40" r="4" fill="#1a1a1a"/>
    <!-- Extremo afilado — la punta -->
    <polygon points="10,0 22,-8 14,10" fill="#1a1a1a"/>
  </g>

  <!-- Versión con wordmark -->
  <text x="500" y="430" font-family="'Didot','Bodoni MT','Playfair Display',serif" font-size="28" font-weight="400" fill="#1a1a1a" letter-spacing="12" text-anchor="middle">YOSSICO</text>
  <text x="500" y="452" font-family="'Helvetica Neue',Helvetica,sans-serif" font-size="7" font-weight="200" fill="#aaa" letter-spacing="5" text-anchor="middle">INFORMES MÉDICOS</text>

  <!-- Por qué funciona -->
  <text x="500" y="498" font-family="'Helvetica Neue',Helvetica,sans-serif" font-size="9" font-weight="200" fill="#999" letter-spacing="1" text-anchor="middle">→ El hilo de sutura: símbolo universal del cuidado médico. Un trazo, una promesa.</text>

  <line x1="80" y1="555" x2="920" y2="555" stroke="#ddd" stroke-width="0.5"/>

  <!-- ============================================================ -->
  <!-- CONCEPTO B: "EL ESCUDO VACÍO" -->
  <!-- Geometría pura. Autoridad sin ornamento. -->
  <!-- ============================================================ -->
  <rect x="0" y="560" width="1000" height="480" fill="#0d0d0d"/>

  <text x="500" y="606" font-family="'Helvetica Neue',Helvetica,sans-serif" font-size="7.5" font-weight="300" fill="#333" letter-spacing="5" text-anchor="middle">CONCEPTO B</text>

  <text x="500" y="632" font-family="'Didot','Bodoni MT','Playfair Display',serif" font-size="26" font-weight="400" fill="#f0eeea" letter-spacing="6" text-anchor="middle">EL ESCUDO</text>
  <text x="500" y="652" font-family="'Helvetica Neue',Helvetica,sans-serif" font-size="9" font-weight="200" fill="#444" letter-spacing="3" text-anchor="middle">geometría pura. protección. autoridad.</text>

  <!-- Ícono B: escudo minimalista, sin adornos, asimétrico y moderno -->
  <g transform="translate(500, 780)">
    <!-- Escudo moderno: no el clásico medieval, sino una forma geométrica nueva -->
    <!-- Dos arcos que se unen en punta abajo, con un corte superior recto -->
    <path d="M-55,-80 L55,-80 L55,-20 C55,40 20,80 0,90 C-20,80 -55,40 -55,-20 Z"
      fill="none"
      stroke="#f0eeea"
      stroke-width="2"/>
    <!-- Línea interna que divide el escudo — detalle de precisión -->
    <line x1="-55" y1="-20" x2="55" y2="-20" stroke="#f0eeea" stroke-width="0.8" opacity="0.4"/>
    <!-- Punto central — enfoque -->
    <circle cx="0" cy="20" r="4" fill="#f0eeea" opacity="0.6"/>
  </g>

  <!-- Wordmark dark -->
  <text x="500" y="910" font-family="'Didot','Bodoni MT','Playfair Display',serif" font-size="28" font-weight="400" fill="#f0eeea" letter-spacing="12" text-anchor="middle">YOSSICO</text>
  <text x="500" y="932" font-family="'Helvetica Neue',Helvetica,sans-serif" font-size="7" font-weight="200" fill="#444" letter-spacing="5" text-anchor="middle">INFORMES MÉDICOS</text>

  <text x="500" y="978" font-family="'Helvetica Neue',Helvetica,sans-serif" font-size="9" font-weight="200" fill="#444" letter-spacing="1" text-anchor="middle">→ El escudo moderno: protección del paciente. Confianza institucional sin decoración.</text>

  <line x1="80" y1="1035" x2="920" y2="1035" stroke="#1e1e1e" stroke-width="0.5"/>

  <!-- ============================================================ -->
  <!-- CONCEPTO C: "LA FISURA" -->
  <!-- Dos trazos que casi se tocan — tensión, precisión, equilibrio -->
  <!-- El más abstracto. El más memorable. -->
  <!-- ============================================================ -->
  <rect x="0" y="1040" width="1000" height="420" fill="url(#bgLight)"/>

  <text x="500" y="1086" font-family="'Helvetica Neue',Helvetica,sans-serif" font-size="7.5" font-weight="300" fill="#aaa" letter-spacing="5" text-anchor="middle">CONCEPTO C — RECOMENDADO</text>

  <text x="500" y="1112" font-family="'Didot','Bodoni MT','Playfair Display',serif" font-size="26" font-weight="400" fill="#1a1a1a" letter-spacing="6" text-anchor="middle">LA FISURA</text>
  <text x="500" y="1132" font-family="'Helvetica Neue',Helvetica,sans-serif" font-size="9" font-weight="200" fill="#888" letter-spacing="3" text-anchor="middle">dos mitades. una sola identidad.</text>

  <!-- Ícono C: dos formas que casi se tocan, creando tensión visual -->
  <!-- Como un bisturí que abre — precisión médica absoluta -->
  <g transform="translate(500, 1240)">
    <!-- Forma izquierda: cuña que apunta a la derecha -->
    <polygon points="-70,-60 -10,0 -70,60" fill="#1a1a1a"/>
    <!-- Espacio vacío — la "fisura" — 8px de separación -->
    <!-- Forma derecha: cuña espejada -->
    <polygon points="70,-60 10,0 70,60" fill="#1a1a1a"/>
    <!-- La fisura entre las dos formas es el diseño -->
  </g>

  <!-- Wordmark -->
  <text x="500" y="1360" font-family="'Didot','Bodoni MT','Playfair Display',serif" font-size="28" font-weight="400" fill="#1a1a1a" letter-spacing="12" text-anchor="middle">YOSSICO</text>
  <text x="500" y="1382" font-family="'Helvetica Neue',Helvetica,sans-serif" font-size="7" font-weight="200" fill="#aaa" letter-spacing="5" text-anchor="middle">INFORMES MÉDICOS</text>

  <text x="500" y="1424" font-family="'Helvetica Neue',Helvetica,sans-serif" font-size="9" font-weight="200" fill="#999" letter-spacing="1" text-anchor="middle">→ La precisión del bisturí. Dos mundos — ciencia y humanidad — que se encuentran en un punto.</text>

  <!-- ============================================================ -->
  <!-- FOOTER: HISTORIA -->
  <!-- ============================================================ -->
  <rect x="0" y="1460" width="1000" height="140" fill="#0d0d0d"/>
  <line x1="80" y1="1480" x2="920" y2="1480" stroke="#1e1e1e" stroke-width="0.4"/>
  <text x="500" y="1506" font-family="'Helvetica Neue',Helvetica,sans-serif" font-size="7.5" font-weight="300" fill="#333" letter-spacing="5" text-anchor="middle">04 — HISTORIA DE MARCA · BORRADOR</text>
  <text x="500" y="1534" font-family="'Helvetica Neue',Helvetica,sans-serif" font-size="10" font-weight="200" fill="#555" letter-spacing="0.3" text-anchor="middle">Ver documento adjunto para la historia completa del fundador.</text>
  <text x="500" y="1558" font-family="'Didot','Bodoni MT','Playfair Display',serif" font-size="12" font-style="italic" fill="#2e2e2e" letter-spacing="2" text-anchor="middle">"Vestidos para sanar. Diseñados para perdurar."</text>
  <line x1="80" y1="1578" x2="920" y2="1578" stroke="#1e1e1e" stroke-width="0.4"/>
</svg>
