<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="YOSSICO — Detalle de producto">
    <title id="page-title">Producto — YOSSICO</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Montserrat:wght@200;300;400&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <style>
        /* ── Product Detail Layout ─────────────────────── */
        .pd {
            display: grid;
            grid-template-columns: 1fr 1fr;
            min-height: calc(100vh - 72px);
            padding-top: 72px;
        }

        /* ── Left: Gallery ─────────────────────────────── */
        .pd__gallery {
            position: sticky;
            top: 72px;
            height: calc(100vh - 72px);
            background: var(--gray-bg);
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .pd__gallery-main {
            flex: 1;
            position: relative;
            overflow: hidden;
        }

        .pd__slide {
            position: absolute;
            inset: 0;
            opacity: 0;
            transition: opacity 0.5s ease;
            pointer-events: none;
        }

        .pd__slide.active {
            opacity: 1;
            pointer-events: auto;
        }

        .pd__slide img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: top center;
            display: block;
        }

        /* Gallery nav arrows */
        .pd__gall-btn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(255, 255, 255, 0.9);
            border: none;
            width: 42px;
            height: 42px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: none;
            z-index: 2;
            backdrop-filter: blur(6px);
            transition: background 0.2s;
        }

        .pd__gall-btn:hover {
            background: #fff;
        }

        .pd__gall-btn svg {
            width: 15px;
            height: 15px;
            stroke: #111;
            stroke-width: 1.8;
            fill: none;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        .pd__gall-btn--prev {
            left: 16px;
        }

        .pd__gall-btn--next {
            right: 16px;
        }

        /* Thumbnail strip */
        .pd__thumbs {
            display: flex;
            gap: 8px;
            padding: 14px 20px;
            background: var(--gray-bg);
            overflow-x: auto;
            scrollbar-width: none;
        }

        .pd__thumbs::-webkit-scrollbar {
            display: none;
        }

        .pd__thumb {
            width: 60px;
            height: 76px;
            flex-shrink: 0;
            overflow: hidden;
            border: 2px solid transparent;
            cursor: none;
            transition: border-color 0.2s;
            background: #ddd;
        }

        .pd__thumb.active {
            border-color: var(--black);
        }

        .pd__thumb img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: top center;
            display: block;
        }

        /* ── Right: Product Info ───────────────────────── */
        .pd__info {
            padding: 64px 56px 80px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
        }

        .pd__breadcrumb {
            font-family: var(--font-body);
            font-weight: 200;
            font-size: 9px;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: var(--gray);
            margin-bottom: 28px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .pd__breadcrumb a {
            color: var(--gray);
            text-decoration: none;
            transition: color 0.2s;
        }

        .pd__breadcrumb a:hover {
            color: var(--black);
        }

        .pd__breadcrumb-sep {
            opacity: 0.4;
            font-size: 10px;
        }

        .pd__line-tag {
            font-family: var(--font-body);
            font-weight: 200;
            font-size: 9px;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: var(--gray);
            display: inline-block;
            border: 1px solid var(--border);
            padding: 5px 12px;
            margin-bottom: 20px;
        }

        .pd__name {
            font-family: var(--font-display);
            font-weight: 300;
            font-size: clamp(52px, 6vw, 80px);
            letter-spacing: -1.5px;
            line-height: 0.92;
            color: var(--black);
            margin-bottom: 12px;
        }

        .pd__sub {
            font-family: var(--font-body);
            font-weight: 200;
            font-size: 10px;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--gray);
            margin-bottom: 32px;
        }

        .pd__divider {
            width: 40px;
            height: 1px;
            background: var(--border);
            margin-bottom: 32px;
        }

        .pd__price {
            font-family: var(--font-display);
            font-weight: 300;
            font-size: 36px;
            color: var(--black);
            margin-bottom: 32px;
            letter-spacing: -0.5px;
        }

        .pd__desc {
            font-family: var(--font-body);
            font-weight: 200;
            font-size: 13px;
            line-height: 2;
            color: #555;
            margin-bottom: 40px;
        }

        /* Color selector */
        .pd__selector-label {
            font-family: var(--font-body);
            font-weight: 200;
            font-size: 8px;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: var(--gray);
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .pd__color-name {
            color: var(--black);
            font-style: normal;
        }

        .pd__colors {
            display: flex;
            gap: 10px;
            margin-bottom: 32px;
        }

        .pd__color-swatch {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            border: 2px solid transparent;
            cursor: none;
            transition: border-color 0.2s, transform 0.15s;
            outline: none;
            position: relative;
        }

        .pd__color-swatch.selected {
            border-color: var(--black);
            transform: scale(1.12);
        }

        .pd__color-swatch:hover {
            transform: scale(1.12);
        }

        /* Size selector */
        .pd__sizes {
            display: flex;
            gap: 8px;
            margin-bottom: 12px;
        }

        .pd__size-btn {
            font-family: var(--font-body);
            font-weight: 300;
            font-size: 10px;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--black);
            background: none;
            border: 1px solid var(--border);
            width: 52px;
            height: 52px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: none;
            transition: all 0.2s;
        }

        .pd__size-btn:hover,
        .pd__size-btn.selected {
            background: var(--black);
            color: var(--white);
            border-color: var(--black);
        }

        .pd__size-guide {
            font-family: var(--font-body);
            font-weight: 200;
            font-size: 9px;
            letter-spacing: 1px;
            color: var(--gray);
            margin-bottom: 32px;
            cursor: none;
            border-bottom: 1px solid var(--border);
            display: inline-block;
            padding-bottom: 2px;
        }

        /* CTAs */
        .pd__ctas {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 40px;
        }

        .pd__cta-primary {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            background: var(--black);
            color: var(--white);
            font-family: var(--font-body);
            font-weight: 200;
            font-size: 10px;
            letter-spacing: 3px;
            text-transform: uppercase;
            border: none;
            padding: 20px;
            cursor: none;
            transition: background 0.25s;
            text-decoration: none;
        }

        .pd__cta-primary:hover {
            background: #1a1a1a;
        }

        .pd__cta-primary svg {
            width: 16px;
            height: 16px;
            fill: currentColor;
            flex-shrink: 0;
        }

        .pd__cta-secondary {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            background: transparent;
            color: var(--black);
            font-family: var(--font-body);
            font-weight: 200;
            font-size: 10px;
            letter-spacing: 3px;
            text-transform: uppercase;
            border: 1px solid var(--border);
            padding: 18px;
            cursor: none;
            transition: all 0.25s;
            text-decoration: none;
        }

        .pd__cta-secondary:hover {
            border-color: var(--black);
            background: var(--gray-bg);
        }

        /* Features table */
        .pd__features {
            border-top: 1px solid var(--border);
            padding-top: 32px;
            margin-top: 8px;
        }

        .pd__features-title {
            font-family: var(--font-body);
            font-weight: 200;
            font-size: 8px;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: var(--gray);
            margin-bottom: 20px;
        }

        .pd__feature {
            display: grid;
            grid-template-columns: 120px 1fr;
            gap: 16px;
            padding: 14px 0;
            border-bottom: 1px solid var(--border);
            align-items: start;
        }

        .pd__feature-label {
            font-family: var(--font-body);
            font-weight: 300;
            font-size: 10px;
            letter-spacing: 1px;
            color: var(--black);
        }

        .pd__feature-value {
            font-family: var(--font-body);
            font-weight: 200;
            font-size: 11px;
            color: var(--gray);
            line-height: 1.6;
        }

        /* No-size shake */
        .pd__sizes.shake {
            animation: shake 0.45s ease;
        }

        /* ── Mobile ──────────────────────────────────── */
        @media (max-width: 900px) {
            .pd {
                grid-template-columns: 1fr;
                padding-top: 72px;
            }

            .pd__gallery {
                position: relative;
                top: 0;
                height: 60vw;
                min-height: 320px;
            }

            .pd__info {
                padding: 40px 24px 60px;
            }

            .pd__name {
                font-size: clamp(44px, 12vw, 64px);
            }
        }
    </style>
</head>

    <script>
        /* ═══════════════════════════════════════════
           YOSSICO — producto.html Page Logic
           ═══════════════════════════════════════════ */

        const params = new URLSearchParams(window.location.search);
        const id = (params.get('id') || '').toLowerCase();
        const prod = YOSSICO_PRODUCTS[id];

        if (!prod) {
            // Producto no encontrado → redirigir a colección
            window.location.href = 'coleccion.html';
        }

        /* ── Populate meta ─────────────────────────── */
        document.getElementById('page-title').textContent = `${prod.name} — YOSSICO`;
        document.querySelector('meta[name="description"]').content =
            `${prod.name} · ${prod.line} · ${prod.priceDisplay} — YOSSICO`;

        /* ── Breadcrumb ────────────────────────────── */
        document.getElementById('pd-breadcrumb-line').textContent = prod.line;
        document.getElementById('pd-breadcrumb-name').textContent = prod.name;

        /* ── Static text fields ────────────────────── */
        document.getElementById('pd-line-tag').textContent = prod.line;
        document.getElementById('pd-name').textContent = prod.name;
        document.getElementById('pd-sub').textContent = prod.sub;
        document.getElementById('pd-price').textContent = prod.priceDisplay;
        document.getElementById('pd-desc').textContent = prod.desc;

        /* ── Features ─────────────────────────────── */
        const featList = document.getElementById('pd-features-list');
        prod.features.forEach(f => {
            featList.insertAdjacentHTML('beforeend', `
        <div class="pd__feature">
          <span class="pd__feature-label">${f.label}</span>
          <span class="pd__feature-value">${f.value}</span>
        </div>`);
        });

        /* ── Gallery state ─────────────────────────── */
        let currentImgs = [...prod.defaultImgs];
        let currentSlide = 0;

        function buildGallery(imgs) {
            const main = document.getElementById('pd-gallery-main');
            const thumbs = document.getElementById('pd-thumbs');

            // Remove existing slides/thumbs (keep nav buttons)
            main.querySelectorAll('.pd__slide').forEach(el => el.remove());
            thumbs.innerHTML = '';

            imgs.forEach((src, i) => {
                // Full slide
                const slide = document.createElement('div');
                slide.className = `pd__slide${i === 0 ? ' active' : ''}`;
                slide.innerHTML = `<img src="${src}" alt="${prod.name} — vista ${i + 1}">`;
                main.insertBefore(slide, main.querySelector('.pd__gall-btn--prev'));

                // Thumbnail
                const thumb = document.createElement('div');
                thumb.className = `pd__thumb${i === 0 ? ' active' : ''}`;
                thumb.innerHTML = `<img src="${src}" alt="Miniatura ${i + 1}">`;
                thumb.addEventListener('click', () => goToSlide(i));
                thumbs.appendChild(thumb);
            });

            currentSlide = 0;
        }

        function goToSlide(idx) {
            const slides = document.querySelectorAll('.pd__slide');
            const thumbs = document.querySelectorAll('.pd__thumb');
            slides.forEach((s, i) => s.classList.toggle('active', i === idx));
            thumbs.forEach((t, i) => t.classList.toggle('active', i === idx));
            currentSlide = idx;
        }

        function advSlide(dir) {
            const total = document.querySelectorAll('.pd__slide').length;
            goToSlide((currentSlide + dir + total) % total);
        }

        document.getElementById('pd-prev').addEventListener('click', () => advSlide(-1));
        document.getElementById('pd-next').addEventListener('click', () => advSlide(1));

        // Initial build
        buildGallery(prod.defaultImgs);

        /* ── Color swatches ───────────────────────── */
        const colorsContainer = document.getElementById('pd-colors');
        const colorNameEl = document.getElementById('pd-color-name');
        let activeColorKey = prod.colors[0].key;

        colorNameEl.textContent = prod.colors[0].label;

        prod.colors.forEach((c, i) => {
            const btn = document.createElement('button');
            btn.className = `pd__color-swatch${i === 0 ? ' selected' : ''}`;
            btn.style.background = c.hex;
            btn.title = c.label;
            btn.setAttribute('aria-label', c.label);
            btn.addEventListener('click', () => {
                colorsContainer.querySelectorAll('.pd__color-swatch').forEach(b => b.classList.remove('selected'));
                btn.classList.add('selected');
                activeColorKey = c.key;
                colorNameEl.textContent = c.label;
                currentImgs = c.imgs;
                buildGallery(c.imgs);
            });
            colorsContainer.appendChild(btn);
        });

        /* ── Size buttons ─────────────────────────── */
        const sizesContainer = document.getElementById('pd-sizes');
        let selectedSize = '';

        sizesContainer.querySelectorAll('.pd__size-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                sizesContainer.querySelectorAll('.pd__size-btn').forEach(b => b.classList.remove('selected'));
                btn.classList.add('selected');
                selectedSize = btn.textContent.trim();
            });
        });

        /* ── WhatsApp link ────────────────────────── */
        const waEl = document.getElementById('pd-wa');
        waEl.href = `https://wa.me/573202562307?text=${prod.wa}`;

        /* ── Add to cart ──────────────────────────── */
        document.getElementById('pd-add-cart').addEventListener('click', () => {
            if (!selectedSize) {
                sizesContainer.classList.add('shake');
                setTimeout(() => sizesContainer.classList.remove('shake'), 500);
                return;
            }
            // Use shared addToCart from cart.js
            addToCart({
                name: prod.name,
                size: selectedSize,
                price: prod.price,
                img: currentImgs[0],
                line: prod.line,
            });
        });
    </script>
</body>

</html>
